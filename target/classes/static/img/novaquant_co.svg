<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34D399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0" />
    </radialGradient>
    
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="800" fill="#111827"/>
  
  <!-- Golden ratio spiral (Fibonacci) -->
  <g id="goldenSpiral" opacity="0.15">
    <path d="M 400 400 
             C 400 340, 440 300, 500 300
             C 620 300, 700 380, 700 500
             C 700 700, 500 900, 300 900
             C -100 900, -300 500, -300 100" 
          fill="none" stroke="#F59E0B" stroke-width="1.5"/>
  </g>
  
  <!-- Metatron's Cube base structure -->
  <g id="metatronBase" opacity="0.2">
    <!-- Outer circle -->
    <circle cx="400" cy="400" r="280" fill="none" stroke="#D97706" stroke-width="1"/>
    
    <!-- 6 surrounding circles -->
    <circle cx="400" cy="120" r="80" fill="none" stroke="#D97706" stroke-width="0.8"/>
    <circle cx="643" cy="260" r="80" fill="none" stroke="#D97706" stroke-width="0.8"/>
    <circle cx="643" cy="540" r="80" fill="none" stroke="#D97706" stroke-width="0.8"/>
    <circle cx="400" cy="680" r="80" fill="none" stroke="#D97706" stroke-width="0.8"/>
    <circle cx="157" cy="540" r="80" fill="none" stroke="#D97706" stroke-width="0.8"/>
    <circle cx="157" cy="260" r="80" fill="none" stroke="#D97706" stroke-width="0.8"/>
  </g>
  
  <!-- Central 3D cube (isometric) representing multi-dimensional analysis -->
  <g id="centralCube">
    <!-- Back face -->
    <path d="M 340 340 L 460 340 L 460 460 L 340 460 Z" 
          fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.4"/>
    
    <!-- Top face -->
    <path d="M 340 340 L 400 300 L 520 300 L 460 340 Z" 
          fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.7" filter="url(#goldGlow)"/>
    
    <!-- Right face -->
    <path d="M 460 340 L 520 300 L 520 420 L 460 460 Z" 
          fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.6"/>
    
    <!-- Front face (brightest) -->
    <path d="M 340 340 L 340 460 L 400 500 L 400 380 Z" 
          fill="none" stroke="url(#goldGrad)" stroke-width="3" filter="url(#goldGlow)"/>
    
    <!-- Bottom face -->
    <path d="M 340 460 L 400 500 L 520 500 L 460 460 Z" 
          fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.5"/>
    
    <!-- Front right face -->
    <path d="M 400 380 L 400 500 L 520 500 L 520 420 Z" 
          fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.8" filter="url(#goldGlow)"/>
  </g>
  
  <!-- Triangular momentum vectors -->
  <g id="momentumVectors">
    <!-- Upward momentum (bullish) -->
    <path d="M 400 250 L 450 330 L 350 330 Z" 
          fill="none" stroke="#34D399" stroke-width="3" filter="url(#goldGlow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Downward momentum (bearish) -->
    <path d="M 400 550 L 350 470 L 450 470 Z" 
          fill="none" stroke="#EF4444" stroke-width="3" filter="url(#goldGlow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="1s"/>
    </path>
    
    <!-- Side momentum vectors -->
    <path d="M 250 400 L 310 370 L 310 430 Z" 
          fill="none" stroke="#F59E0B" stroke-width="2.5" opacity="0.7"/>
    <path d="M 550 400 L 490 370 L 490 430 Z" 
          fill="none" stroke="#F59E0B" stroke-width="2.5" opacity="0.7"/>
  </g>
  
  <!-- Sacred geometry circles (representing support/resistance levels) -->
  <g id="sacredCircles">
    <circle cx="400" cy="400" r="200" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.4"/>
    <circle cx="400" cy="400" r="150" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.5"/>
    <circle cx="400" cy="400" r="100" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.7"/>
    <circle cx="400" cy="400" r="50" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.9" filter="url(#goldGlow)"/>
  </g>
  
  <!-- Vertex points (price action nodes) -->
  <g id="vertexPoints">
    <!-- Top -->
    <circle cx="400" cy="300" r="8" fill="#FCD34D" filter="url(#goldGlow)">
      <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Top right -->
    <circle cx="470" cy="330" r="7" fill="#FBBF24" filter="url(#goldGlow)">
      <animate attributeName="r" values="7;10;7" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <!-- Right -->
    <circle cx="520" cy="400" r="8" fill="#FCD34D" filter="url(#goldGlow)">
      <animate attributeName="r" values="8;11;8" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <!-- Bottom right -->
    <circle cx="470" cy="470" r="7" fill="#FBBF24" filter="url(#goldGlow)">
      <animate attributeName="r" values="7;10;7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Bottom -->
    <circle cx="400" cy="500" r="8" fill="#FCD34D" filter="url(#goldGlow)">
      <animate attributeName="r" values="8;12;8" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <!-- Bottom left -->
    <circle cx="330" cy="470" r="7" fill="#FBBF24" filter="url(#goldGlow)">
      <animate attributeName="r" values="7;10;7" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <!-- Left -->
    <circle cx="280" cy="400" r="8" fill="#FCD34D" filter="url(#goldGlow)">
      <animate attributeName="r" values="8;11;8" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <!-- Top left -->
    <circle cx="330" cy="330" r="7" fill="#FBBF24" filter="url(#goldGlow)">
      <animate attributeName="r" values="7;10;7" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Central monogram 'NQ' in geometric style -->
  <g id="geometricMonogram">
    <circle cx="400" cy="400" r="35" fill="url(#centerGlow)" opacity="0.3"/>
    
    <!-- 'N' formed by parallel lines -->
    <line x1="375" y1="415" x2="375" y2="385" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="375" y1="385" x2="395" y2="415" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="395" y1="415" x2="395" y2="385" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    
    <!-- 'Q' as circle with tail -->
    <circle cx="415" cy="400" r="12" fill="none" stroke="#FFFFFF" stroke-width="5"/>
    <line x1="423" y1="408" x2="430" y2="415" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- Connecting lines (market correlations) -->
  <g id="correlations" opacity="0.15">
    <line x1="400" y1="300" x2="470" y2="330" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="470" y1="330" x2="520" y2="400" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="520" y1="400" x2="470" y2="470" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="470" y1="470" x2="400" y2="500" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="400" y1="500" x2="330" y2="470" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="330" y1="470" x2="280" y2="400" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="280" y1="400" x2="330" y2="330" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="330" y1="330" x2="400" y2="300" stroke="#F59E0B" stroke-width="1.5"/>
  </g>
  
  <!-- Rotating frame (time cycle) -->
  <g id="timeWheel">
    <circle cx="400" cy="400" r="250" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.2" stroke-dasharray="10,20">
      <animateTransform attributeName="transform" type="rotate" from="0 400 400" to="360 400 400" dur="60s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Typography -->
  <text x="400" y="640" font-family="'Cinzel', 'Trajan Pro', 'Times New Roman', serif" 
        font-size="70" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">
    NOVAQUANT
  </text>
  
  <text x="400" y="680" font-family="'Cinzel', 'Times New Roman', serif" 
        font-size="16" font-weight="400" fill="#F59E0B" text-anchor="middle" letter-spacing="12">
    GEOMETRIC PRECISION TRADING
  </text>
  
  <!-- Corner sacred symbols -->
  <g id="cornerSymbols" opacity="0.3">
    <!-- Top left -->
    <circle cx="100" cy="100" r="15" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
    <circle cx="100" cy="100" r="10" fill="none" stroke="#F59E0B" stroke-width="1"/>
    <circle cx="100" cy="100" r="5" fill="#F59E0B"/>
    
    <!-- Top right -->
    <circle cx="700" cy="100" r="15" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
    <circle cx="700" cy="100" r="10" fill="none" stroke="#F59E0B" stroke-width="1"/>
    <circle cx="700" cy="100" r="5" fill="#F59E0B"/>
    
    <!-- Bottom left -->
    <circle cx="100" cy="700" r="15" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
    <circle cx="100" cy="700" r="10" fill="none" stroke="#F59E0B" stroke-width="1"/>
    <circle cx="100" cy="700" r="5" fill="#F59E0B"/>
    
    <!-- Bottom right -->
    <circle cx="700" cy="700" r="15" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
    <circle cx="700" cy="700" r="10" fill="none" stroke="#F59E0B" stroke-width="1"/>
    <circle cx="700" cy="700" r="5" fill="#F59E0B"/>
  </g>
</svg>